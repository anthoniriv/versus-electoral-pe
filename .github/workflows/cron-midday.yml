name: Cron Midday Scrape

on:
  schedule:
    # 12:00 Peru (UTC-5) = 17:00 UTC
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  trigger-cron-endpoint:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ vars.APP_URL }}" ] && [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Missing APP_URL (set vars.APP_URL or secrets.APP_URL in environment/repo)"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

      - name: Call /api/cron
        run: |
          APP_URL="${{ vars.APP_URL }}"
          if [ -z "$APP_URL" ]; then
            APP_URL="${{ secrets.APP_URL }}"
          fi

          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${APP_URL}/api/cron")

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)

          echo "HTTP $status"
          echo "$body"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            exit 1
          fi
